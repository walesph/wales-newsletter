name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'wrangler.jsonc'
      - 'package.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # wrangler deploy 를 실행. 런타임 시크릿(SUPABASE_SERVICE_ROLE_KEY 등)은
      # 사전에 `wrangler secret put` 또는 Cloudflare 대시보드에서 등록해 두어야 함.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
